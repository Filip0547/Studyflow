services:
  - type: web
    name: studyflow
    runtime: python
    autoDeploy: true
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
      - key: MAIL_TIMEOUT
        value: "10"
