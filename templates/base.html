<!DOCTYPE html>
<html lang="{{ get_locale() }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}StudyFlow{% endblock %}</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='img/studyflow_logo_transparent.png') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="{{ url_for('index') }}" class="nav-logo">
                <img src="{{ url_for('static', filename='img/studyflow_logo_transparent.png') }}" alt="StudyFlow Logo" class="logo-img" onerror="this.style.display='none'">
                <span class="logo-text">StudyFlow</span>
            </a>
            <div class="nav-links">
                {% if current_user %}
                    <a href="{{ url_for('dashboard') }}" class="nav-btn nav-btn-primary">{{ _('Dashboard') }}</a>
                    <a href="{{ url_for('logout') }}" class="nav-btn nav-btn-secondary">{{ _('Logout') }}</a>
                {% else %}
                    <a href="{{ url_for('login') }}" class="nav-btn nav-btn-secondary">{{ _('Login') }}</a>
                    <a href="{{ url_for('register') }}" class="nav-btn nav-btn-primary">{{ _('Get Started') }}</a>
                {% endif %}
                <!-- Language Selector -->
                <div class="language-selector">
                    <a href="{{ url_for('set_language', lang='en') }}" class="language-link {% if get_locale() == 'en' %}active{% endif %}">English</a>
                    <a href="{{ url_for('set_language', lang='nl') }}" class="language-link {% if get_locale() == 'nl' %}active{% endif %}">Nederlands</a>
                    <a href="{{ url_for('set_language', lang='pl') }}" class="language-link {% if get_locale() == 'pl' %}active{% endif %}">Polski</a>
                    <a href="{{ url_for('set_language', lang='ru') }}" class="language-link {% if get_locale() == 'ru' %}active{% endif %}">Русский</a>
                    <a href="{{ url_for('set_language', lang='es') }}" class="language-link {% if get_locale() == 'es' %}active{% endif %}">Español</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- MAIN CONTENT -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="footer-container">
            <p>© 2024 StudyFlow — {{ _('Learn smarter, not harder.') }}</p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='javascript/main.js') }}"></script>
</body>
</html>
