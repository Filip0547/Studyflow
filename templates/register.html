{% extends "base.html" %}
{% block title %}{{ _('Register') }} — StudyFlow{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo">📚</div>
            <h1>{{ _('Create account') }}</h1>
            <p>{{ _('Start learning smarter today') }}</p>
        </div>

        <form method="POST" action="{{ url_for('register') }}" class="auth-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            {{ form.hidden_tag() if form }}

            <div class="form-group">
                <label for="email">{{ _('Email') }}</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    class="form-input"
                    placeholder="{{ _('Enter your email address') }}"
                    autocomplete="email"
                    required
                    autofocus
                >
            </div>

            <div class="form-group">
                <label for="username">{{ _('Username') }}</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    class="form-input"
                    placeholder="{{ _('Choose a username') }}"
                    autocomplete="off"
                    required
                >
            </div>

            <div class="form-group">
                <label for="password">{{ _('Password') }}</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    class="form-input"
                    placeholder="{{ _('Create a password') }}"
                    autocomplete="new-password"
                    required
                >
            </div>

            <button type="submit" class="btn btn-primary btn-full">{{ _('Create account') }}</button>
        </form>

        <div class="auth-footer">
            {{ _('Already have an account?') }} <a href="{{ url_for('login') }}">{{ _('Sign in') }}</a>
        </div>
    </div>
</div>
{% endblock %}
